# Dev: lokalna baza MongoDB dla backendu. Pełny stack (konteneryzacja
# aplikacji) dopiero Etap 4. Uruchomienie: `docker compose up -d`.
services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - teamable-mongo-data:/data/db
    # Healthcheck pozwala `docker compose up -d --wait` zaczekać, aż baza
    # faktycznie przyjmuje połączenia — dzięki temu `migrate`/`seed` zaraz po
    # starcie nie trafiają na jeszcze niegotowy mongod.
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  teamable-mongo-data:
